[package]
name = "styrene-secrets"
version = "0.1.1"
edition.workspace = true
rust-version = "1.75"
license.workspace = true
repository.workspace = true
description = "Application secret resolution for Styrene extensions"

[features]
default = []
file-store = ["dep:rusqlite", "dep:argon2", "dep:chacha20poly1305", "dep:rand_core"]
keychain = ["dep:keyring", "dep:hex", "file-store"]

[dependencies]
secrecy = "0.10"
thiserror = ">=1, <3"
zeroize = { version = "1", features = ["derive"] }

# file-store feature — accept both rusqlite 0.31 and 0.32
rusqlite = { version = ">=0.31, <0.33", optional = true, features = ["bundled"] }
argon2 = { version = "0.5", optional = true }
chacha20poly1305 = { version = "0.10", optional = true }
rand_core = { version = "0.6.4", optional = true, features = ["getrandom"] }

# keychain feature — OS keychain passphrase storage
keyring = { version = "3", optional = true }
hex = { version = "0.4", optional = true }

[dev-dependencies]
tempfile = "3"
