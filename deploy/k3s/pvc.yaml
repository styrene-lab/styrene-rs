apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: styrene-hub-data
  namespace: styrene
  labels:
    app.kubernetes.io/name: styrene-hub
    app.kubernetes.io/component: hub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uses default StorageClass (typically local-path on k3s)
