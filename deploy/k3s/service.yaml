apiVersion: v1
kind: Service
metadata:
  name: styrene-hub
  namespace: styrene
  labels:
    app.kubernetes.io/name: styrene-hub
    app.kubernetes.io/component: hub
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: styrene-hub
  ports:
    - name: transport
      port: 4242
      targetPort: transport
      protocol: TCP
