apiVersion: apps/v1
kind: Deployment
metadata:
  name: styrene-hub
  namespace: styrene
  labels:
    app.kubernetes.io/name: styrene-hub
    app.kubernetes.io/component: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: styrene-hub
  strategy:
    type: Recreate  # Single writer for SQLite
  template:
    metadata:
      labels:
        app.kubernetes.io/name: styrene-hub
        app.kubernetes.io/component: hub
    spec:
      containers:
        - name: styrened
          image: ghcr.io/styrene-lab/styrened-hub:latest
          ports:
            - name: transport
              containerPort: 4242
              protocol: TCP
          env:
            - name: STYRENE_CONFIG_DIR
              value: /etc/styrene
            - name: STYRENE_DATA_DIR
              value: /var/lib/styrene
            - name: LXMF_DISPLAY_NAME
              value: "Styrene Community Hub"
          volumeMounts:
            - name: config
              mountPath: /etc/styrene
              readOnly: true
            - name: data
              mountPath: /var/lib/styrene
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: transport
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: transport
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: styrene-hub-config
        - name: data
          persistentVolumeClaim:
            claimName: styrene-hub-data
