# Mesh integration test topology.
#
# Hub:   TCP server on :4242, socket at /run/styrene/daemon.sock — bridges mesh-core and mesh-isolated
# Alpha: TCP client -> hub, socket at /run/styrene/daemon.sock — mesh-core
# Beta:  TCP client -> hub, socket at /run/styrene/daemon.sock — mesh-core
# Gamma: TCP client -> hub, socket at /run/styrene/daemon.sock — mesh-isolated
# Operator: CLI only, accesses daemon sockets via shared volumes
#
# Usage:
#   docker compose -f tests/mesh/docker-compose.yml up -d --build
#   # operator runs tests automatically and exits
#   docker compose -f tests/mesh/docker-compose.yml logs operator
#   docker compose -f tests/mesh/docker-compose.yml down -v

services:
  hub:
    build:
      context: ../..
      dockerfile: tests/mesh/Dockerfile.styrened
    image: styrened-mesh:latest
    container_name: mesh-hub
    hostname: hub
    command:
      - styrened
      - --socket
      - /run/styrene/daemon.sock
      - --config
      - /etc/styrene/config.toml
      - --transport
      - 0.0.0.0:4242
      - --announce-interval-secs
      - "15"
    volumes:
      - hub-sock:/run/styrene
      - ./configs/hub.toml:/etc/styrene/config.toml:ro
    environment:
      - STYRENE_CONFIG=/etc/styrene/config.toml
      - LXMF_DISPLAY_NAME=hub
    healthcheck:
      test: ["CMD", "test", "-S", "/run/styrene/daemon.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - mesh-core
      - mesh-isolated

  alpha:
    build:
      context: ../..
      dockerfile: tests/mesh/Dockerfile.styrened
    image: styrened-mesh:latest
    container_name: mesh-alpha
    hostname: alpha
    entrypoint: ["bash", "-c"]
    command:
      - |
        sleep 5
        styrened --socket /run/styrene/daemon.sock --config /etc/styrene/config.toml --transport 0.0.0.0:4242 --announce-interval-secs 15
    depends_on:
      hub:
        condition: service_healthy
    volumes:
      - alpha-sock:/run/styrene
      - ./configs/alpha.toml:/etc/styrene/config.toml:ro
    environment:
      - STYRENE_CONFIG=/etc/styrene/config.toml
      - LXMF_DISPLAY_NAME=alpha
    healthcheck:
      test: ["CMD", "test", "-S", "/run/styrene/daemon.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - mesh-core

  beta:
    build:
      context: ../..
      dockerfile: tests/mesh/Dockerfile.styrened
    image: styrened-mesh:latest
    container_name: mesh-beta
    hostname: beta
    entrypoint: ["bash", "-c"]
    command:
      - |
        sleep 5
        styrened --socket /run/styrene/daemon.sock --config /etc/styrene/config.toml --transport 0.0.0.0:4242 --announce-interval-secs 15
    depends_on:
      hub:
        condition: service_healthy
    volumes:
      - beta-sock:/run/styrene
      - ./configs/beta.toml:/etc/styrene/config.toml:ro
    environment:
      - STYRENE_CONFIG=/etc/styrene/config.toml
      - LXMF_DISPLAY_NAME=beta
    healthcheck:
      test: ["CMD", "test", "-S", "/run/styrene/daemon.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - mesh-core

  gamma:
    build:
      context: ../..
      dockerfile: tests/mesh/Dockerfile.styrened
    image: styrened-mesh:latest
    container_name: mesh-gamma
    hostname: gamma
    entrypoint: ["bash", "-c"]
    command:
      - |
        sleep 5
        styrened --socket /run/styrene/daemon.sock --config /etc/styrene/config.toml --transport 0.0.0.0:4242 --announce-interval-secs 15
    depends_on:
      hub:
        condition: service_healthy
    volumes:
      - gamma-sock:/run/styrene
      - ./configs/gamma.toml:/etc/styrene/config.toml:ro
    environment:
      - STYRENE_CONFIG=/etc/styrene/config.toml
      - LXMF_DISPLAY_NAME=gamma
    healthcheck:
      test: ["CMD", "test", "-S", "/run/styrene/daemon.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 10s
    networks:
      - mesh-isolated

  operator:
    build:
      context: ../..
      dockerfile: tests/mesh/Dockerfile.operator
    image: styrene-operator:latest
    container_name: mesh-operator
    hostname: operator
    entrypoint: ["bash", "-c"]
    command:
      - |
        sleep 15
        /harness/run_tests.sh
    depends_on:
      hub:
        condition: service_healthy
      alpha:
        condition: service_healthy
      beta:
        condition: service_healthy
      gamma:
        condition: service_healthy
    environment:
      HUB_SOCK: /run/styrene-hub/daemon.sock
      ALPHA_SOCK: /run/styrene-alpha/daemon.sock
      BETA_SOCK: /run/styrene-beta/daemon.sock
      GAMMA_SOCK: /run/styrene-gamma/daemon.sock
    volumes:
      - hub-sock:/run/styrene-hub:ro
      - alpha-sock:/run/styrene-alpha:ro
      - beta-sock:/run/styrene-beta:ro
      - gamma-sock:/run/styrene-gamma:ro
    networks:
      - mesh-core
      - mesh-isolated

networks:
  mesh-core:
    driver: bridge
  mesh-isolated:
    driver: bridge

volumes:
  hub-sock:
  alpha-sock:
  beta-sock:
  gamma-sock:
