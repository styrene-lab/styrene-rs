name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libudev-dev libwebkit2gtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libudev-dev libwebkit2gtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libudev-dev libwebkit2gtk-4.1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings -A clippy::unwrap_used -A clippy::items_after_test_module -A clippy::single_match -A clippy::useless_conversion -A clippy::vec_init_then_push -A clippy::needless_borrows_for_generic_args -A clippy::derivable_impls -A clippy::len_zero -A clippy::result_large_err

  interop:
    name: Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r tests/interop/python/requirements.txt
      - name: Generate test fixtures
        run: cd tests/interop/python && python3 generate_fixtures.py
      - name: Run interop tests
        run: cargo test --package styrene-rns --features interop-tests,transport

  # Verify all feature profiles compile (mobile, desktop, FFI)
  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "desktop (default)"
            features: ""
          - name: "mobile (minimal)"
            features: "--no-default-features"
          - name: "mobile-identity"
            features: "--no-default-features --features mobile-identity"
          - name: "terminal only"
            features: "--no-default-features --features terminal"
          - name: "ipc-server only"
            features: "--no-default-features --features ipc-server"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "Check: ${{ matrix.name }}"
        run: cargo check -p styrened ${{ matrix.features }}

  # macOS-only: verify keychain feature compiles (requires security-framework)
  feature-keychain:
    name: Feature Matrix (keychain)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: "Check: mobile-keychain"
        run: cargo check -p styrened --no-default-features --features mobile-keychain

  # UniFFI bridge compilation
  ffi-bridge:
    name: FFI Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p styrene-mobile-ffi

  # E2E integration tests
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p styrene-e2e

  lipstyk:
    name: lipstyk
    uses: styrene-lab/lipstyk/.github/workflows/lipstyk.yml@main
    with:
      paths: "crates/"
      threshold: 50
