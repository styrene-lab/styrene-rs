name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag is on main/master
        run: |
          git fetch origin main master 2>/dev/null || true
          TAG_COMMIT=$(git rev-parse HEAD)
          for branch in main master; do
            if git rev-parse "origin/$branch" >/dev/null 2>&1; then
              if git merge-base --is-ancestor "$TAG_COMMIT" "origin/$branch"; then
                echo "Tag is on $branch"
                exit 0
              fi
            fi
          done
          echo "ERROR: Tag is not on main or master"
          exit 1

  test:
    name: Full test suite
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --no-deps -- -D warnings
      - run: cargo test --workspace

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p styrene-rns --allow-dirty || echo "styrene-rns already published"
          sleep 30
          cargo publish -p styrene-lxmf --allow-dirty || echo "styrene-lxmf already published"
          sleep 30
          cargo publish -p styrene-mesh --allow-dirty || echo "styrene-mesh already published"
          sleep 30
          cargo publish -p styrene-ipc --allow-dirty || echo "styrene-ipc already published"
          sleep 30
          cargo publish -p styrene-ipc-server --allow-dirty || echo "styrene-ipc-server already published"

  # ── Binary builds ────────────────────────────────────────────────────────

  build:
    name: Build ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            dx: true
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            dx: false
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            cross: false
            dx: true
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            cross: false
            dx: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux x86_64: webkit2gtk for styrene-dx
      - name: Install Linux system deps
        if: matrix.name == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # Linux aarch64: use cross-rs
      - name: Install cross-rs
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build daemon and TUI
      - name: Build styrened
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p styrened --target ${{ matrix.target }}
          else
            cargo build --release -p styrened --target ${{ matrix.target }}
          fi

      - name: Build styrene-tui
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p styrene-tui --target ${{ matrix.target }}
          else
            cargo build --release -p styrene-tui --target ${{ matrix.target }}
          fi

      # Desktop app (optional — may fail on some targets)
      - name: Build styrene-dx
        if: matrix.dx
        continue-on-error: true
        run: cargo build --release -p styrene-dx --target ${{ matrix.target }}

      # Upload individual binaries as artifacts
      - name: Upload styrened
        uses: actions/upload-artifact@v4
        with:
          name: styrened-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/styrened

      - name: Upload styrene-tui
        uses: actions/upload-artifact@v4
        with:
          name: styrene-tui-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/styrene-tui

      - name: Upload styrene-dx
        if: matrix.dx
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: styrene-dx-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/styrene-dx

  # ── Package macOS universal binaries ─────────────────────────────────────

  package-macos:
    name: Package macOS
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-apple-darwin"
          path: artifacts

      - name: Create universal binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist/styrene-${VERSION}-macos-universal
          mkdir -p dist/styrene-${VERSION}-macos-arm64
          mkdir -p dist/styrene-${VERSION}-macos-x86_64

          for bin in styrened styrene-tui styrene-dx; do
            ARM="artifacts/${bin}-aarch64-apple-darwin/${bin}"
            X86="artifacts/${bin}-x86_64-apple-darwin/${bin}"

            # Per-arch copies
            if [ -f "$ARM" ]; then
              cp "$ARM" "dist/styrene-${VERSION}-macos-arm64/${bin}"
            fi
            if [ -f "$X86" ]; then
              cp "$X86" "dist/styrene-${VERSION}-macos-x86_64/${bin}"
            fi

            # Universal via lipo
            if [ -f "$ARM" ] && [ -f "$X86" ]; then
              lipo -create "$ARM" "$X86" -output "dist/styrene-${VERSION}-macos-universal/${bin}"
              echo "Created universal binary: ${bin}"
            elif [ -f "$ARM" ]; then
              cp "$ARM" "dist/styrene-${VERSION}-macos-universal/${bin}"
              echo "Using arm64 only for ${bin}"
            fi
          done

      - name: Create archives
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd dist
          for dir in styrene-${VERSION}-macos-*; do
            chmod +x ${dir}/*
            tar -czf "${dir}.tar.gz" "$dir"
            echo "Created ${dir}.tar.gz"
          done

      - name: Upload macOS archives
        uses: actions/upload-artifact@v4
        with:
          name: macos-archives
          path: dist/*.tar.gz

  # ── Package Linux binaries ──────────────────────────────────────────────

  package-linux:
    name: Package Linux
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-linux-*"
          path: artifacts

      - name: Create archives
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # x86_64 (all three binaries)
          mkdir -p dist/styrene-${VERSION}-linux-x86_64
          for bin in styrened styrene-tui styrene-dx; do
            SRC="artifacts/${bin}-x86_64-unknown-linux-gnu/${bin}"
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/styrene-${VERSION}-linux-x86_64/${bin}"
            fi
          done
          chmod +x dist/styrene-${VERSION}-linux-x86_64/*
          tar -czf "dist/styrene-${VERSION}-linux-x86_64.tar.gz" -C dist "styrene-${VERSION}-linux-x86_64"

          # aarch64 (daemon + tui only)
          mkdir -p dist/styrene-${VERSION}-linux-aarch64
          for bin in styrened styrene-tui; do
            SRC="artifacts/${bin}-aarch64-unknown-linux-gnu/${bin}"
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/styrene-${VERSION}-linux-aarch64/${bin}"
            fi
          done
          chmod +x dist/styrene-${VERSION}-linux-aarch64/*
          tar -czf "dist/styrene-${VERSION}-linux-aarch64.tar.gz" -C dist "styrene-${VERSION}-linux-aarch64"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Upload Linux archives
        uses: actions/upload-artifact@v4
        with:
          name: linux-archives
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt

  # ── GitHub Release ──────────────────────────────────────────────────────

  release:
    name: GitHub Release
    needs: [publish, package-macos, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: macos-archives
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: linux-archives
          path: release

      - name: Generate combined checksums
        run: |
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt
