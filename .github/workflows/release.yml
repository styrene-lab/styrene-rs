name: Release

on:
  push:
    tags: ['[0-9]*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. 0.2.0). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
  APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
  APPLE_SIGNING_CERT_B64: ${{ secrets.APPLE_SIGNING_CERT_B64 }}
  APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

jobs:
  # ── Validation ────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main/master
        run: |
          git fetch origin main master 2>/dev/null || true
          TAG_COMMIT=$(git rev-parse HEAD)
          for branch in main master; do
            if git rev-parse "origin/$branch" >/dev/null 2>&1; then
              if git merge-base --is-ancestor "$TAG_COMMIT" "origin/$branch"; then
                echo "Tag $TAG_COMMIT is on $branch"
                exit 0
              fi
            fi
          done
          echo "ERROR: Tag $TAG_COMMIT is not on main or master"
          exit 1

  test:
    name: Full test suite
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # Exclude crates with platform-specific build deps (webkit2gtk, PyO3)
      - run: cargo clippy --workspace --all-targets --no-deps --exclude styrene-dx --exclude styrene-native
      - run: cargo test --workspace --exclude styrene-dx --exclude styrene-native

  # ── Publish library crates ────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p styrene-rns --allow-dirty || echo "styrene-rns already published"
          sleep 30
          cargo publish -p styrene-lxmf --allow-dirty || echo "styrene-lxmf already published"
          sleep 30
          cargo publish -p styrene-mesh --allow-dirty || echo "styrene-mesh already published"
          sleep 30
          cargo publish -p styrene-ipc --allow-dirty || echo "styrene-ipc already published"
          sleep 30
          cargo publish -p styrene-ipc-server --allow-dirty || echo "styrene-ipc-server already published"

  # ── Primary builds (macOS + Linux x86_64) ─────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            zigbuild: true
            dx: true
          - target: x86_64-apple-darwin
            os: macos-13
            zigbuild: false
            dx: true
          - target: aarch64-apple-darwin
            os: macos-14
            zigbuild: false
            dx: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Install Linux system deps (webkit2gtk for styrene-dx)
        if: matrix.dx && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # Build daemon + TUI
      - name: Build styrened + styrene-tui
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p styrened -p styrene-tui
          else
            cargo build --release --target ${{ matrix.target }} -p styrened -p styrene-tui
          fi

      # Desktop app (may fail — still experimental)
      - name: Build styrene-dx
        if: matrix.dx
        continue-on-error: true
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p styrene-dx
          else
            cargo build --release --target ${{ matrix.target }} -p styrene-dx
          fi

      - name: Strip binaries
        run: |
          for bin in styrened styrene-tui styrene-dx; do
            BINARY="target/${{ matrix.target }}/release/${bin}"
            [ -f "$BINARY" ] || continue
            if command -v llvm-strip >/dev/null 2>&1; then
              llvm-strip "$BINARY"
            elif command -v strip >/dev/null 2>&1; then
              strip "$BINARY" 2>/dev/null || true
            fi
          done

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/styrene-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/styrene-signing.p12"
          echo "$APPLE_SIGNING_CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${APPLE_SIGNING_CERT_PASSWORD:-}" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Sign macOS binaries
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != ''
        run: |
          for bin in styrened styrene-tui styrene-dx; do
            BINARY="target/${{ matrix.target }}/release/${bin}"
            [ -f "$BINARY" ] || continue
            codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$BINARY"
            codesign --verify --deep --strict --verbose=2 "$BINARY"
          done

      - name: Notarize macOS binaries
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_API_KEY_P8_B64 != ''
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"
          for bin in styrened styrene-tui styrene-dx; do
            BINARY="target/${{ matrix.target }}/release/${bin}"
            [ -f "$BINARY" ] || continue
            NOTARY_ZIP="$RUNNER_TEMP/${bin}-${{ matrix.target }}-notary.zip"
            ditto -c -k --keepParent "$BINARY" "$NOTARY_ZIP"
            for attempt in 1 2 3; do
              echo "Notarizing ${bin} (attempt $attempt/3)..."
              if xcrun notarytool submit "$NOTARY_ZIP" \
                --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER" --timeout 10m --wait; then
                echo "Notarization succeeded for ${bin}"
                break
              fi
              [ "$attempt" -eq 3 ] && echo "::warning::Notarization failed for ${bin}" && break
              sleep 30
            done
          done

      - name: Create archive
        run: |
          VERSION="${RELEASE_TAG}"
          ARCHIVE="styrene-${VERSION}-${{ matrix.target }}.tar.gz"
          STAGING="styrene-${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          for bin in styrened styrene-tui styrene-dx; do
            BINARY="target/${{ matrix.target }}/release/${bin}"
            [ -f "$BINARY" ] && cp "$BINARY" "$STAGING/"
          done
          chmod +x "$STAGING"/*
          tar czf "$ARCHIVE" "$STAGING"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # ── Extended build (Linux ARM — slow cross-compile) ──────────
  build-extended:
    name: Build aarch64-unknown-linux-gnu
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build styrened + styrene-tui
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu -p styrened -p styrene-tui

      - name: Strip binaries
        run: |
          for bin in styrened styrene-tui; do
            BINARY="target/aarch64-unknown-linux-gnu/release/${bin}"
            [ -f "$BINARY" ] && llvm-strip "$BINARY" 2>/dev/null || strip "$BINARY" 2>/dev/null || true
          done

      - name: Create archive
        run: |
          VERSION="${RELEASE_TAG}"
          ARCHIVE="styrene-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          STAGING="styrene-${VERSION}-aarch64-unknown-linux-gnu"
          mkdir -p "$STAGING"
          cp target/aarch64-unknown-linux-gnu/release/styrened "$STAGING/"
          cp target/aarch64-unknown-linux-gnu/release/styrene-tui "$STAGING/"
          chmod +x "$STAGING"/*
          tar czf "$ARCHIVE" "$STAGING"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-aarch64-unknown-linux-gnu
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # ── Linux ABI validation ─────────────────────────────────────
  linux-abi-validation:
    name: Linux ABI (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04
            image: ubuntu:22.04
            install_cmd: apt-get update && apt-get install -y libc6 libgcc-s1 ca-certificates file
          - name: rockylinux-9
            image: rockylinux:9
            install_cmd: dnf install -y glibc libgcc file ca-certificates
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-x86_64-unknown-linux-gnu
          path: abi-artifacts

      - name: Validate in ${{ matrix.name }}
        run: |
          set -euo pipefail
          mkdir -p abi-artifacts/unpacked
          tar xzf abi-artifacts/styrene-*.tar.gz -C abi-artifacts/unpacked --strip-components=1
          docker run --rm \
            -v "$PWD/abi-artifacts/unpacked:/work:ro" \
            "${{ matrix.image }}" \
            /bin/sh -lc '
              set -e
              ${{ matrix.install_cmd }}
              /work/styrened --version || /work/styrened --help | head -1
            '

  # ── Release ──────────────────────────────────────────────────
  release:
    name: Create release
    needs: [build, linux-abi-validation]
    # build-extended (linux arm64) runs in parallel but doesn't block release.
    # Its artifacts are included if available.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          cat checksums.sha256

      - name: Generate release manifest
        run: |
          python3 scripts/release_manifest.py generate \
            --tag "${RELEASE_TAG}" \
            --checksums artifacts/checksums.sha256 \
            --output artifacts/release-manifest.json \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}"
          cat artifacts/release-manifest.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for archive in styrene-*.tar.gz; do
            cosign sign-blob --yes "$archive" \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem"
          done

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          IS_NIGHTLY=false
          IS_RC=false
          PRERELEASE_FLAG=""
          DRAFT_FLAG=""
          if echo "${RELEASE_TAG}" | grep -q "\-nightly\."; then
            IS_NIGHTLY=true
            PRERELEASE_FLAG="--prerelease"
            DRAFT_FLAG="--draft"
          elif echo "${RELEASE_TAG}" | grep -q "\-rc\."; then
            IS_RC=true
            PRERELEASE_FLAG="--prerelease"
          fi

          ASSET_FILES=(artifacts/styrene-*.tar.gz artifacts/styrene-*.tar.gz.sha256)
          ASSET_FILES+=(artifacts/styrene-*.tar.gz.sig artifacts/styrene-*.tar.gz.pem)
          ASSET_FILES+=(artifacts/checksums.sha256 artifacts/release-manifest.json)

          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete "${RELEASE_TAG}" --repo "${{ github.repository }}" --yes || true
            sleep 3
          fi

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --title "${RELEASE_TAG}" \
            --generate-notes \
            $PRERELEASE_FLAG $DRAFT_FLAG \
            "${ASSET_FILES[@]}"

      - name: Attest build provenance
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/styrene-*.tar.gz

      - name: Trigger Homebrew formula update
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          gh workflow run homebrew.yml \
            --repo "${{ github.repository }}" \
            -f tag_name="${RELEASE_TAG}"

  # ── OCI images (stable only) ─────────────────────────────────
  oci-images:
    name: OCI images
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-nightly.') && !contains(inputs.tag_name || github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: oci
            description: "styrened daemon"
          - image: oci-i2p
            description: "styrened with I2P proxy"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Authenticate to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ matrix.image }}
        run: |
          VERSION="${RELEASE_TAG}"
          nix run .#${{ matrix.image }}.copyToRegistry --accept-flake-config

      - name: Tag as latest
        run: |
          VERSION="${RELEASE_TAG}"
          IMAGE_NAME=$(nix eval --raw .#${{ matrix.image }}.imageName --accept-flake-config 2>/dev/null || echo "")
          [ -z "$IMAGE_NAME" ] && exit 0
          skopeo copy "docker://${IMAGE_NAME}:${VERSION}" "docker://${IMAGE_NAME}:latest"
